<div class="agenda-layout">
    <header class="agenda-header">
        <div class="header-content container">
            <div class="logo">
                <h2>Clinfy-Atendimento-Online</h2>
            </div>
            <div class="actions" style="display: flex; align-items: center;">
                <div *ngIf="canAccessAttendance" class="credits-badge" (click)="showCreditStatement = true" title="Ver Extrato de Créditos" style="cursor: pointer; margin-right: 1.5rem; display: flex; align-items: center; background: #e0f2fe; color: #0369a1; padding: 0.5rem 1rem; border-radius: 20px; font-weight: 600; transition: background 0.3s;">
                    <i class="fa fa-coins" style="margin-right: 0.5rem;"></i>
                    <span *ngIf="(credits$ | async) !== null">{{ credits$ | async }} Créditos</span>
                    <span *ngIf="(credits$ | async) === null">...</span>
                </div>
                <button *ngIf="canAccessAttendance" class="secondary" style="margin-right:1rem;" routerLink="/appointments">
                    Ver Todos (Lista)
                </button>
                <button *ngIf="canAccessAttendance" class="primary" style="margin-right:0.5rem;" (click)="showPatientForm = true">+
                    Paciente</button>
                <button *ngIf="canAccessAttendance" class="primary" style="margin-right:1rem;" (click)="showAppointmentForm = true">+
                    Agendamento</button>
                <button *ngIf="canAccessAdmin" class="secondary" style="margin-right:1rem; display: inline-flex; align-items: center; gap: 6px;" routerLink="/dashboard" title="Acessar Métricas">
                    <i class="fa fa-chart-pie" style="color: #8b5cf6;"></i> Dashboard
                </button>
                <button class="secondary" style="display: inline-flex; align-items: center; gap: 6px; color: #ef4444; border: 1px solid #f87171; background-color: #fef2f2;" (click)="logout()" title="Sair do Sistema">
                    <i class="fa fa-times"></i> Sair
                </button>
            </div>
        </div>
    </header>

    <main class="container agenda-main">
        <div class="agenda-card card">
            <div class="month-selector">
                <button class="secondary btn-icon" (click)="previousMonth()">&#8592;</button>
                <h3 class="month-title">{{ monthName }}</h3>
                <button class="secondary btn-icon" (click)="nextMonth()">&#8594;</button>
            </div>

            <div class="loading" *ngIf="loading">Carregando agendamentos...</div>

            <div class="empty-state" *ngIf="!loading && appointments.length === 0">
                <p>Nenhum atendimento agendado para este mês.</p>
            </div>

            <div class="calendar-container" *ngIf="!loading">
                <div class="calendar-header-grid">
                    <div class="weekday" *ngFor="let day of weekDays">{{ day }}</div>
                </div>
                <div class="calendar-body">
                    <div class="calendar-week" *ngFor="let week of calendarWeeks">
                        <div class="calendar-day" *ngFor="let d of week" [class.empty-day]="!d">
                            <div class="day-number" *ngIf="d">{{ d.day }}</div>
                            <div class="day-appointments" *ngIf="d">
                                <div class="apt-badge" *ngFor="let apt of d.appointments"
                                    [ngClass]="getStatusClass(apt.status)"
                                    (click)="selectedAppointment = apt; $event.stopPropagation()">
                                    {{ formatTime(apt.time) }} - {{ apt.patient?.name?.split(' ')[0] }}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Patient Popup Component -->
<app-patient-popup *ngIf="selectedAppointment" [appointment]="selectedAppointment" (close)="selectedAppointment = null"
    (statusChanged)="loadAppointments()">
</app-patient-popup>

<app-patient-form *ngIf="showPatientForm" [doctorId]="doctorId!" (close)="showPatientForm = false" (created)="onPatientCreated()">
</app-patient-form>

<app-appointment-form *ngIf="showAppointmentForm" [doctorId]="doctorId!" (close)="showAppointmentForm = false"
    (created)="onAppointmentCreated()">
</app-appointment-form>

<!-- Credit Statement Popup Component -->
<app-credit-statement-popup *ngIf="showCreditStatement" [doctorId]="doctorId!" (close)="showCreditStatement = false">
</app-credit-statement-popup>
