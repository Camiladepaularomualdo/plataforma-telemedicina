<div class="login-container">
    <div class="card login-card">
        <div class="login-header">
            <h1>Clinfy-Atendimento-Online</h1>
            <p class="subtitle">{{ isLoginMode ? 'Acesso a plataforma' : 'Crie sua conta médica' }}</p>
        </div>

        <div *ngIf="isLoginMode" class="form-section">
            <div *ngIf="loginError" class="error-msg">{{ loginError }}</div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" [(ngModel)]="loginEmail" placeholder="medico@exemplo.com" />
            </div>

            <div class="form-group">
                <label>Senha</label>
                <input type="password" [(ngModel)]="loginPassword" placeholder="Sua senha secreta" />
            </div>

            <button class="primary full-width" (click)="onLogin()">Entrar</button>

            <div class="toggle-link">
                <p>Não tem conta? <a (click)="toggleMode()">Cadastre-se</a></p>
            </div>
        </div>

        <div *ngIf="!isLoginMode" class="form-section">
            <div *ngIf="regError" class="error-msg">{{ regError }}</div>

            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" [(ngModel)]="regName" placeholder="Dr. João Silva" />
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" [(ngModel)]="regEmail" placeholder="medico@exemplo.com" />
            </div>

            <div class="form-group">
                <label>Senha</label>
                <input type="password" [(ngModel)]="regPassword" placeholder="Mínimo 6 caracteres" />
            </div>

            <div class="form-group row">
                <div class="col">
                    <label>CPF</label>
                    <input type="text" [(ngModel)]="regCpf" placeholder="Apenas números" />
                </div>
                <div class="col">
                    <label>Telefone</label>
                    <input type="text" [(ngModel)]="regPhone" placeholder="(XX) XXXXX-XXXX" />
                </div>
            </div>

            <div class="form-group">
                <label>Data de Nascimento</label>
                <input type="date" [(ngModel)]="regBirthDate" />
            </div>

            <button class="primary full-width" (click)="onRegister()">Criar Conta</button>

            <div class="toggle-link">
                <p>Já tem conta? <a (click)="toggleMode()">Voltar para Login</a></p>
            </div>
        </div>
    </div>
</div>
