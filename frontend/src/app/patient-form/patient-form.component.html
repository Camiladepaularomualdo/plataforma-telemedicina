<div class="modal-overlay" (click)="close.emit()">
    <div class="modal-content card" (click)="$event.stopPropagation()">
        <div class="modal-header">
            <h3>Novo Paciente</h3>
            <button class="close-btn" (click)="close.emit()">&times;</button>
        </div>

        <div class="modal-body">
            <div *ngIf="errorStr" class="error-msg">{{ errorStr }}</div>

            <div class="form-group">
                <label>Nome do Paciente</label>
                <input type="text" [(ngModel)]="patient.name" placeholder="Nome Completo" />
            </div>

            <div class="form-group row">
                <div class="col">
                    <label>Email</label>
                    <input type="email" [(ngModel)]="patient.email" />
                </div>
                <div class="col">
                    <label>Telefone</label>
                    <input type="text" [(ngModel)]="patient.phone" />
                </div>
            </div>

            <div class="form-group row">
                <div class="col">
                    <label>CPF</label>
                    <input type="text" [(ngModel)]="patient.cpf" />
                </div>
                <div class="col">
                    <label>Data de Nasc.</label>
                    <input type="date" [(ngModel)]="patient.birthDate" />
                </div>
            </div>
        </div>

        <div class="modal-footer">
            <button class="primary full-width" (click)="save()">Salvar Paciente</button>
        </div>
    </div>
</div>
