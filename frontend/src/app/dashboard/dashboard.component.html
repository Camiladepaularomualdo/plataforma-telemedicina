<div class="dashboard-container">
    <div class="header">
        <button class="back-btn" (click)="goBack()" style="display: inline-flex; align-items: center; gap: 6px; color: #ef4444; border: 1px solid #f87171; background-color: #fef2f2;">
            <i class="fa fa-times"></i> Sair
        </button>
        <div class="month-selector">
            <button class="btn btn-outline" (click)="previousMonth()">&lt;</button>
            <h2>{{ monthName | titlecase }}</h2>
            <button class="btn btn-outline" (click)="nextMonth()">&gt;</button>
        </div>
        <div style="width: 100px;"></div> <!-- Spacer -->
    </div>

    <div class="chart-container" *ngIf="!loading && lineChartData.datasets.length > 0">
        <canvas baseChart [data]="lineChartData" [options]="lineChartOptions" [type]="'line'">
        </canvas>
    </div>

    <div class="loading-container" *ngIf="loading">
        <p>Carregando dados...</p>
    </div>
</div>
